name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Default job: pure cargo, no cmake, on the two reference platforms.
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14] # macos-14 = Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux capture deps (for nokhwa V4L2, later milestones)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libv4l-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Smoke-run the M0 spine (headless)
        run: cargo run -p ge-cli -- --frames 10

  # License / supply-chain gate.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
