# cargo-deny configuration — enforces the permissive-OSS license policy.
# Run: cargo deny check

[licenses]
# Only permissive licenses are allowed in the dependency tree. Copyleft
# (GPL/AGPL/LGPL) and non-commercial (CC-BY-NC) licenses are rejected so the
# project stays cleanly open-source and adoptable.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0", # permissive data license (webpki root certs bundle)
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
